<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewtCode Academy</title>
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
    <link rel="manifest" href="images/favicon/site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navigation">
        <div class="logo_and_name">
            <img id="logo" src="images/png/newton_the_newt_logo.png" alt="newton the newt logo">
            <h3 id="name">NewtCode Academy</h3>
        </div>
        <ul>
            <li id="signin" style="word-spacing: -2px">Sign in</li>
            <div id="join">
                <li>Join</li>
            </div>
        </ul>
    </div>

    <div class="hero">
        <div class="left">
            <h1 id="hero-bigtext">Coding for Kids</h1>
            <h4 id="hero-smalltext">Powered by <i>Newton</i>, your AI coding buddy</h4>
            <h4 id="hero-button">Start Learning</h4>
        </div>
        <div class="right">
            <img id="heroimg" src="/images/svg/undraw_programming_j1zw.svg" alt="ai code assistant">
        </div>
    </div>
    
</body>
</html>
